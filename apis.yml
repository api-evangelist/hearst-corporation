x-developer-presence:
  summary: >-
    Hearst Corporation has no parent-level developer portal, public API
    catalog, or OpenAPI program. Developer surfaces, when they exist, sit
    inside operating subsidiaries (notably Fitch Group, First Databank,
    MOTOR, QGenda, and Bring a Trailer) and are documented in their own
    api-evangelist repositories, not here. There is no official Hearst
    Corporation GitHub organization publishing SDKs, CLIs, or sample code;
    third-party GitHub orgs that contain the string "Hearst" are not
    affiliated with Hearst Communications and were intentionally excluded.
  parentPortal: null
  parentOpenAPI: null
  parentSDKs: []
  parentStatusPage: null
  parentChangelog: null
  parentGitHub: null
