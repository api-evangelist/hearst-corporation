name: Hearst
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
description: >-
  Hearst is a privately held, diversified American media, information, and
  services conglomerate headquartered in the Hearst Tower in New York City.
  Founded in 1887 by William Randolph Hearst, the company spans more than 360
  businesses across magazines, newspapers, broadcast television, cable
  networks, business and financial information, healthcare information,
  automotive data, and venture investments. Hearst reported approximately
  US$13B in revenue (2024) with ~22,000 employees worldwide.
