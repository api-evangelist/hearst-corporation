x-portfolio:
  description: >-
    Hearst is a holding company with 360+ operating businesses across six
    primary segments. The portfolio below enumerates the major divisions,
    brands, joint ventures, and subsidiaries — none of which currently expose
    a public developer API at the parent level. Where individual subsidiaries
    do publish APIs (e.g. Fitch Ratings, First Databank, MOTOR, Bring a
    Trailer), they are or will be profiled in their own api-evangelist repos.
